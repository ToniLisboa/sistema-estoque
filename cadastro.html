<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro | Sistema de Estoque</title>
<link rel="stylesheet" href="estilo/style.css">
</head>
<body>
<header class="topo">
<div class="topo-conteudo">
<div>
<p class="etiqueta">Cadastro</p>
<h1>Novo produto</h1>
<p class="subtitulo">Adicione itens ao estoque com limites minimos para controle preventivo.</p>
</div>
<nav class="menu">
<a class="menu-link" href="index.html">Painel</a>
<a class="menu-link ativo" href="cadastro.html">Cadastro</a>
<a class="menu-link" href="estoque.html">Estoque</a>
<a class="menu-link" href="requisicoes.html">Requisicoes</a>
<a class="menu-link" href="movimentacoes.html">Movimentacoes</a>
<a class="menu-link" href="relatorios.html">Relatorios</a>
</nav>
</div>
</header>

<main class="layout">
<section class="card formulario-card">
<div class="secao-topo">
<h2>Cadastro de produto</h2>
<span class="contador">Preencha os campos abaixo</span>
</div>

<form id="formCadastro" class="form-grid">
<input type="text" id="codigo" placeholder="Codigo do produto" required>
<input type="text" id="nome" placeholder="Nome do produto" required>
<input type="number" id="quantidade" placeholder="Quantidade inicial" min="0" required>
<input type="number" id="minimo" placeholder="Estoque minimo" min="0" required>
<input type="number" id="emergencia" placeholder="Estoque de emergencia" min="0" required>
<button type="submit">Adicionar produto</button>
</form>

<p id="mensagemCadastro" class="mensagem" aria-live="polite"></p>
</section>
</main>

<script src="script.js"></script>
</body>
</html>
